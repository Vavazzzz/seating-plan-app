name: Deploy macOS

on:
  push:
    tags:
      - 'mac-v*' # Trigger only on Mac-specific tags (e.g., mac-v1.1.9)

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install -r requirements/gui.txt
          pip install pyinstaller

      # Note: Ensure src/ui/main_window.py is your actual entry point
      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --windowed --name "SeatingPlan-macOS" \
          --add-data "src:src" \
          src/ui/main_window.py

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dist/dmg
          create-dmg \
            --volname "Seating Plan Editor" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "SeatingPlan-macOS.app" 200 190 \
            --hide-extension "SeatingPlan-macOS.app" \
            --app-drop-link 600 185 \
            "dist/dmg/SeatingPlan-${{ github.ref_name }}.dmg" \
            "dist/SeatingPlan-macOS.app"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "macOS Release ${{ github.ref_name }}"
          files: dist/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}